<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    CSP própria desta start page. Servida via protocolo pilot://newtab dentro de
    um <webview> isolado (sem acesso a window.pilot). NADA de <script> inline:
    o JS vem por <script src>. Favicons vêm do Google s2 (img-src).
  -->
  <!-- img-src libera https: para as miniaturas das notícias (vêm de CDNs variados:
       glbimg, cnnbrasil, infomoney…). connect-src 'self' cobre o fetch a
       pilot://newtab/_data/* (mesma origem). -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src https: data:; connect-src 'self'; base-uri 'none'; form-action 'none';" />
  <title>Nova aba</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <main class="page">
    <!-- Marca Logica -->
    <header class="brand">
      <span class="brand-mark" aria-hidden="true">◢</span>
      <h1 class="brand-name">Logica<span class="brand-name-accent">Pilot</span></h1>
    </header>

    <!-- Busca central -->
    <form class="search" id="search-form" autocomplete="off" role="search">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input
        id="search-input"
        class="search-input"
        type="text"
        name="q"
        placeholder="Pesquise na web ou digite um endereço"
        aria-label="Pesquisar ou digitar endereço"
        spellcheck="false"
        autofocus />
      <button class="search-go" id="search-go" type="submit" aria-label="Pesquisar">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>

    <!-- Card Pilot (IA): pede à casca para abrir o painel autônomo já preenchido.
         A home é isolada (sem window.pilot); fala com a casca via window.lpHome
         exposto pelo webview-preload (guardado por protocolo pilot://). -->
    <section class="pilot-card" aria-label="Pilot — controle autônomo">
      <div class="pilot-card-head">
        <span class="pilot-card-mark" aria-hidden="true">◢</span>
        <div class="pilot-card-titles">
          <strong class="pilot-card-title">Pilot</strong>
          <span class="pilot-card-sub">Diga um objetivo — eu navego, clico e leio por você.</span>
        </div>
      </div>
      <form class="pilot-card-form" id="pilot-form" autocomplete="off">
        <textarea
          id="pilot-input"
          class="pilot-card-input"
          rows="2"
          placeholder="O que você quer que eu faça? Ex: pesquise o preço do RTX 4090"
          aria-label="Objetivo para o Pilot"
          spellcheck="false"></textarea>
        <button type="submit" class="pilot-card-go" id="pilot-go">Pilotar ▸</button>
      </form>
    </section>

    <!-- Atalhos rápidos / Mais visitados (grade dinâmica, populada por newtab.js).
         Cai para a lista padrão quando ainda não há histórico. -->
    <nav class="shortcuts" id="shortcuts" aria-label="Atalhos rápidos"></nav>

    <!-- Feed de notícias (PT-BR/Brasil). Carregado por newtab.js via
         fetch pilot://newtab/_data/news?cat=. Estilo Edge/MSN: abas + grade. -->
    <section class="news" id="news" aria-label="Notícias">
      <div class="news-head">
        <h2 class="news-title">Notícias</h2>
        <div class="news-tabs" id="news-tabs" role="tablist" aria-label="Categorias de notícias"></div>
      </div>
      <div class="news-grid" id="news-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="foot">
    <span class="foot-dot" aria-hidden="true">·</span>
    <span class="foot-text">Navegação inteligente · Logica Pilot</span>
  </footer>

  <script src="newtab.js"></script>
</body>
</html>
