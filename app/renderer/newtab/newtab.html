<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Dedicated CSP for this start page. Served via the pilot://newtab protocol inside
    an isolated <webview> (no access to window.pilot). NO inline <script>: the JS
    comes via <script src>. Favicons come from Google s2 (img-src).
  -->
  <!-- img-src allows https: for the news thumbnails (they come from various CDNs).
       connect-src 'self' covers the fetch to pilot://newtab/_data/* (same origin). -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src https: data:; connect-src 'self'; base-uri 'none'; form-action 'none';" />
  <title>New tab</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <main class="page">
    <!-- Marca Logica -->
    <header class="brand">
      <span class="brand-mark" aria-hidden="true">◢</span>
      <h1 class="brand-name">Logica<span class="brand-name-accent">Pilot</span></h1>
    </header>

    <!-- Busca central -->
    <form class="search" id="search-form" autocomplete="off" role="search">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input
        id="search-input"
        class="search-input"
        type="text"
        name="q"
        placeholder="Search the web or enter an address"
        data-i18n-ph="home.search"
        aria-label="Search or enter an address"
        spellcheck="false"
        autofocus />
      <button class="search-go" id="search-go" type="submit" aria-label="Search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>

    <!-- Pilot card (AI): asks the shell to open the autonomous panel pre-filled.
         The home is isolated (no window.pilot); it talks to the shell via window.lpHome
         exposed by webview-preload (guarded by the pilot:// protocol). -->
    <section class="pilot-card" aria-label="Pilot — autonomous control">
      <div class="pilot-card-head">
        <span class="pilot-card-mark" aria-hidden="true">◢</span>
        <div class="pilot-card-titles">
          <strong class="pilot-card-title">Pilot</strong>
          <span class="pilot-card-sub" data-i18n="home.pilotSub">Tell me a goal — I navigate, click and read for you.</span>
        </div>
      </div>
      <form class="pilot-card-form" id="pilot-form" autocomplete="off">
        <textarea
          id="pilot-input"
          class="pilot-card-input"
          rows="2"
          placeholder="What do you want me to do? e.g. find the price of the RTX 4090"
          data-i18n-ph="home.pilotPlaceholder"
          aria-label="Goal for Pilot"
          spellcheck="false"></textarea>
        <button type="submit" class="pilot-card-go" id="pilot-go" data-i18n="pilot.run">Pilotar ▸</button>
      </form>
    </section>

    <!-- Quick shortcuts / Most visited (dynamic grid, populated by newtab.js).
         Falls back to the default list when there is no history yet. -->
    <nav class="shortcuts" id="shortcuts" aria-label="Quick shortcuts"></nav>

    <!-- News feed. Loaded by newtab.js via fetch pilot://newtab/_data/news?cat=.
         Edge/MSN style: tabs + grid. -->
    <section class="news" id="news" aria-label="News">
      <div class="news-head">
        <h2 class="news-title" data-i18n="home.newsTitle">News</h2>
        <div class="news-tabs" id="news-tabs" role="tablist" aria-label="News categories"></div>
      </div>
      <div class="news-grid" id="news-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="foot">
    <span class="foot-dot" aria-hidden="true">·</span>
    <span class="foot-text" data-i18n="home.footer">Smart browsing · Logica Pilot</span>
  </footer>

  <script src="newtab.js"></script>
</body>
</html>
