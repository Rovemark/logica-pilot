<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Downloads page (pilot://downloads). Runs in an isolated <webview>, without
    window.pilot. Talks to main via same-origin fetch():
      GET  pilot://downloads/_data/list
      POST pilot://downloads/_action   {id, action}   action: open|showInFolder|cancel
    CSP: 'self' for script/style/fetch; no external images (inline icons).
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src data:; connect-src 'self'; base-uri 'none'; form-action 'none';" />
  <title>Downloads</title>
  <link rel="stylesheet" href="downloads.css" />
</head>
<body>
  <main class="page">
    <header class="page-head">
      <div class="head-brand">
        <span class="brand-mark" aria-hidden="true">◢</span>
        <h1 class="page-title">Downloads</h1>
      </div>
      <button class="btn-soft" id="refresh" type="button">Refresh</button>
    </header>

    <section class="list" id="list" aria-live="polite">
      <p class="empty" id="empty">Loading…</p>
    </section>
  </main>

  <script src="downloads.js"></script>
</body>
</html>
