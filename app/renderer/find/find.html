<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; script-src 'self';" />
  <link rel="stylesheet" href="find.css" />
</head>
<body>
  <div id="find" class="find">
    <input id="find-input" type="text" placeholder="Find in page" spellcheck="false" autocomplete="off" />
    <span id="find-count" class="find-count">0/0</span>
    <button id="find-prev" class="fb" title="Previous (⇧Enter)">▲</button>
    <button id="find-next" class="fb" title="Next (Enter)">▼</button>
    <button id="find-close" class="fb" title="Close (Esc)">✕</button>
  </div>
  <script src="find.js"></script>
</body>
</html>
