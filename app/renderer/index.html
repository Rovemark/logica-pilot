<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- crx: allowed in img-src for the extensions' browser-action icons
       (electron-chrome-extensions serves them via crx://extension-icon/...). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: crx:; script-src 'self';" />
  <title>Logica Pilot</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bookmarks.css" />
  <!-- theme applied as early as possible to minimize flash (CSP: .js file, no inline) -->
  <script src="theme.js"></script>
  <!-- i18n: translation catalog + runtime (before renderer.js orchestrates) -->
  <script src="i18n/locales.js"></script>
  <script src="i18n/i18n.js"></script>
</head>
<body>
  <!-- Title bar / tabs (draggable region) -->
  <header class="titlebar" id="titlebar">
    <div class="brand" title="Logica Pilot">
      <span class="brand-mark">◢</span>
      <span class="brand-name">Logica&nbsp;Pilot</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <button class="tab-new" id="tab-new" data-i18n-title="tab.new" title="New tab (⌘T)">+</button>
    <div class="spacer"></div>
    <div class="win-controls" id="win-controls">
      <button data-win="min" class="wc">—</button>
      <button data-win="max" class="wc">▢</button>
      <button data-win="close" class="wc wc-close">✕</button>
    </div>
  </header>

  <!-- Toolbar: navigation + address + Pilot toggle -->
  <div class="toolbar">
    <div class="nav-group">
      <button id="nav-back" class="nav-btn" data-i18n-title="nav.back" title="Back">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="nav-fwd" class="nav-btn" data-i18n-title="nav.fwd" title="Forward">
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button id="nav-reload" class="nav-btn" data-i18n-title="nav.reload" title="Reload">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>

    <form id="address-form" class="address-wrap">
      <span class="lock" id="lock">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </span>
      <input id="address" class="address" type="text" spellcheck="false"
             data-i18n-ph="address.placeholder" placeholder="Search or enter an address" autocomplete="off" />
      <!-- bookmark star (bookmarks.js wires the click; fills when bookmarked) -->
      <button type="button" id="star-btn" class="star-btn" data-i18n-title="star.title" data-i18n-aria="star.aria" title="Bookmark (⌘D)" aria-label="Bookmark page">
        <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.6 1.1 6.5L12 17.9l-5.8 3.05 1.1-6.5-4.7-4.6 6.5-.95z"/></svg>
      </button>
      <!-- suggestions dropdown (omnibox.js) -->
      <div id="omni-suggest" class="omni-suggest" hidden></div>
    </form>

    <!-- Incognito badge (renderer shows it only in the incognito window) -->
    <span id="incognito-badge" class="incognito-badge" data-i18n-title="incognito.title" title="Incognito window — no history, in-memory profile" hidden>
      <svg viewBox="0 0 24 24"><circle cx="7.5" cy="15" r="3.5"/><circle cx="16.5" cy="15" r="3.5"/><path d="M11 15h2M4 11l1.6-4.2A2 2 0 0 1 7.5 5.5h9a2 2 0 0 1 1.9 1.3L20 11M2 11h20"/></svg>
      <span data-i18n="incognito.label">Incognito</span>
    </span>

    <button id="theme-btn" class="nav-btn" data-i18n-title="theme.title" data-i18n-aria="theme.aria" title="Theme (⌘⇧L)" aria-label="Toggle theme"></button>

    <!-- Ad-block shield: shows the number of blocked requests; click toggles blocking. -->
    <button id="adblock-btn" class="nav-btn adblock-btn" data-i18n-title="adblock.title" data-i18n-aria="adblock.title" title="Ad-block" aria-label="Ad-block">
      <svg viewBox="0 0 24 24"><path d="M12 2l8 3v6c0 5-3.4 8.6-8 11-4.6-2.4-8-6-8-11V5z"/></svg>
      <span class="adblock-count" id="adblock-count" hidden>0</span>
    </button>

    <!-- Row of Chrome extension buttons (electron-chrome-extensions). The preload
         injects the API that defines this custom element. partition must match the
         one used by the <webview> tabs. -->
    <browser-action-list id="ext-actions" partition="persist:logica-pilot"></browser-action-list>

    <!-- Extensions button (🧩) → opens the installed-extensions menu / Web Store. -->
    <button id="ext-btn" class="nav-btn" data-i18n-title="ext.title" data-i18n-aria="ext.title" title="Extensions" aria-label="Extensions">
      <svg viewBox="0 0 24 24"><path d="M20.5 11H19V7a2 2 0 0 0-2-2h-4V3.5a2.5 2.5 0 0 0-5 0V5H4a2 2 0 0 0-2 2v3.8h1.5a2.7 2.7 0 0 1 0 5.4H2V20a2 2 0 0 0 2 2h3.8v-1.5a2.7 2.7 0 0 1 5.4 0V22H17a2 2 0 0 0 2-2v-4h1.5a2.5 2.5 0 0 0 0-5z"/></svg>
    </button>

    <button id="pilot-toggle" class="pilot-toggle" data-i18n-title="pilot.toggle" title="Pilot panel">
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 6.9L21 11l-6.6 2.1L12 20l-2.4-6.9L3 11l6.6-2.1z"/></svg>
      <span data-i18n="pilot.label">Pilot</span>
    </button>

    <button id="menu-btn" class="nav-btn" data-i18n-title="menu.title" data-i18n-aria="menu.title" title="Menu" aria-label="Menu">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
    </button>
    <!-- ⋮ dropdown (overlays.js fills in the items) -->
    <div id="app-menu" class="menu-popover" hidden></div>
    <!-- 🧩 extensions dropdown (renderer fills in the installed extensions) -->
    <div id="ext-menu" class="menu-popover" hidden></div>

    <!-- page load progress bar -->
    <div id="progress" class="progress" hidden></div>
  </div>

  <!-- Bookmarks bar (toggle ⌘⇧B; bookmarks.js fills in the items) -->
  <div id="bookmarks-bar" class="bookmarks-bar" hidden></div>

  <!-- Content: webviews + Pilot panel -->
  <main class="content">
    <div class="views" id="views"></div>

    <!-- findbar (findbar.js) -->
    <div id="findbar" class="findbar" hidden>
      <input id="find-input" type="text" data-i18n-ph="find.placeholder" placeholder="Find in page" spellcheck="false" autocomplete="off" />
      <span id="find-count">0/0</span>
      <button id="find-prev" data-i18n-title="find.prev" title="Previous (⇧Enter)">▲</button>
      <button id="find-next" data-i18n-title="find.next" title="Next (Enter)">▼</button>
      <button id="find-close" data-i18n-title="find.close" title="Close (Esc)">✕</button>
    </div>

    <!-- zoom indicator (renderer.js shows/hides) -->
    <div id="zoom-pill" class="zoom-pill" hidden><span id="zoom-pct">100%</span></div>

    <!-- permission prompt (renderer.js fills it) -->
    <div id="perm-prompt" class="perm-prompt" hidden></div>

    <aside class="pilot" id="pilot">
      <div class="pilot-head">
        <div class="pilot-title">
          <span class="brand-mark sm">◢</span>
          <div>
            <strong>Logica Pilot</strong>
            <small data-i18n="pilot.subtitle">autonomous control · CDP</small>
          </div>
        </div>
        <span class="status-dot" id="status-dot" title="brain"></span>
      </div>

      <div class="pilot-input">
        <textarea id="goal" rows="3"
          data-i18n-ph="pilot.goalPlaceholder"
          placeholder="What do you want me to do? e.g. &quot;search the price of the iPhone 15 on Google and tell me the cheapest&quot;"></textarea>
        <div class="pilot-controls">
          <label class="switch" data-i18n-title="pilot.visionTitle" title="Sends screenshots to the model (more expensive, sees opaque sites)">
            <input type="checkbox" id="vision" />
            <span data-i18n="pilot.vision">vision</span>
          </label>
          <div class="grow"></div>
          <button id="run" class="btn-run" data-i18n="pilot.run">Pilot ▸</button>
          <button id="stop" class="btn-stop" data-i18n="pilot.stop" hidden>stop ◼</button>
        </div>
      </div>

      <div class="timeline" id="timeline">
        <div class="empty" id="timeline-empty">
          <span class="brand-mark big">◢</span>
          <p data-i18n="pilot.emptyHint">Give me a goal and I navigate on my own —<br/>I click, type, scroll and read the page<br/>by intent, not by pixel.</p>
        </div>
      </div>

      <div class="result" id="result" hidden></div>
    </aside>
  </main>

  <!-- downloads shelf (overlays.js controls it) -->
  <div id="downloads-shelf" class="dl-shelf" hidden></div>

  <!-- Overlays (overlays.js fills and controls open/close) -->
  <div id="settings-overlay" class="overlay" hidden></div>
  <div id="about-overlay" class="overlay" hidden></div>
  <div id="history-overlay" class="overlay" hidden></div>
  <div id="downloads-overlay" class="overlay" hidden></div>
  <div id="bookmarks-overlay" class="overlay" hidden></div>

  <!-- order matters: modules before renderer.js (which orchestrates) -->
  <script src="tabs.js"></script>
  <script src="omnibox.js"></script>
  <script src="findbar.js"></script>
  <script src="overlays.js"></script>
  <script src="bookmarks.js"></script>
  <!-- Reader mode: @mozilla/readability source (string) + window.Reader module -->
  <script src="reader/readability-source.js"></script>
  <script src="reader/reader.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
