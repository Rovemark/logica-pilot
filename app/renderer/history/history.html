<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    History page (pilot://history). Runs in an isolated <webview>, without
    window.pilot. Talks to main via same-origin fetch():
      GET  pilot://history/_data/list?q=&limit=
      POST pilot://history/_action/delete   {url}
      POST pilot://history/_action/clear    {range}
    CSP: 'self' for script/style/fetch; img https for favicons (Google s2).
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src https://www.google.com data:; connect-src 'self'; base-uri 'none'; form-action 'none';" />
  <title>History</title>
  <link rel="stylesheet" href="history.css" />
</head>
<body>
  <main class="page">
    <header class="page-head">
      <div class="head-brand">
        <span class="brand-mark" aria-hidden="true">◢</span>
        <h1 class="page-title">History</h1>
      </div>
      <div class="head-actions">
        <form class="search" id="search-form" autocomplete="off" role="search">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input id="search-input" class="search-input" type="text" name="q"
                 placeholder="Search history" aria-label="Search history"
                 spellcheck="false" />
        </form>
        <button class="btn-danger" id="clear-all" type="button">Clear all</button>
      </div>
    </header>

    <section class="list" id="list" aria-live="polite">
      <p class="empty" id="empty">Loading…</p>
    </section>
  </main>

  <script src="history.js"></script>
</body>
</html>
