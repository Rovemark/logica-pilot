<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Logica Pilot — the browser your AI pilots">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d17"/>
      <stop offset="1" stop-color="#12162a"/>
    </linearGradient>
    <linearGradient id="mk" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6a4bff"/>
      <stop offset="1" stop-color="#4da3ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6a4bff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6a4bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#8ea0ff" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="20" fill="url(#dots)"/>
  <circle cx="156" cy="168" r="165" fill="url(#halo)"/>

  <!-- brand mark (drawn triangle) -->
  <path d="M108 214 L206 116 L206 214 Z" fill="url(#mk)" filter="url(#soft)"/>

  <!-- title + tagline -->
  <text x="262" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="62" font-weight="800" fill="#f4f6ff" letter-spacing="-1.8">Logica Pilot</text>
  <text x="265" y="204" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="21" font-weight="400" fill="#98a2c9">The browser your AI pilots — perception by intent, not pixels.</text>

  <!-- capability pills -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14.5" font-weight="600">
    <g transform="translate(265,240)">
      <rect width="216" height="42" rx="21" fill="#7c5cff1f" stroke="#7c5cff55"/>
      <text x="24" y="27" fill="#c6b6ff">5–185× fewer tokens</text>
    </g>
    <g transform="translate(497,240)">
      <rect width="132" height="42" rx="21" fill="#4da3ff1f" stroke="#4da3ff55"/>
      <text x="24" y="27" fill="#a9d2ff">CLI + MCP</text>
    </g>
    <g transform="translate(645,240)">
      <rect width="196" height="42" rx="21" fill="#3ddc971f" stroke="#3ddc9755"/>
      <text x="22" y="27" fill="#89efc4">learns your sites</text>
    </g>
  </g>
</svg>
