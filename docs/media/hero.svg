<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Logica Pilot — the AI-native browser">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f1a"/>
      <stop offset="1" stop-color="#161a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#4da3ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g opacity="0.06" stroke="#8ea0ff" stroke-width="1">
    <path d="M0 80H1200M0 160H1200M0 240H1200"/>
    <path d="M300 0V320M600 0V320M900 0V320"/>
  </g>

  <!-- mark -->
  <text x="72" y="176" font-family="-apple-system, Segoe UI, sans-serif" font-size="120" font-weight="800" fill="url(#accent)" filter="url(#glow)">◢</text>

  <!-- title + tagline -->
  <text x="196" y="150" font-family="-apple-system, Segoe UI, sans-serif" font-size="62" font-weight="800" fill="#f2f4ff" letter-spacing="-1.5">Logica Pilot</text>
  <text x="200" y="196" font-family="-apple-system, Segoe UI, sans-serif" font-size="24" font-weight="500" fill="#aeb6d8">The browser your AI pilots — perception by intent, not pixels.</text>

  <!-- stat chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="600">
    <g transform="translate(200,236)">
      <rect width="215" height="40" rx="20" fill="#7c5cff22" stroke="#7c5cff66"/>
      <text x="20" y="26" fill="#c9b8ff">5–185× fewer tokens</text>
    </g>
    <g transform="translate(430,236)">
      <rect width="150" height="40" rx="20" fill="#4da3ff22" stroke="#4da3ff66"/>
      <text x="20" y="26" fill="#a9d2ff">CLI + MCP</text>
    </g>
    <g transform="translate(596,236)">
      <rect width="185" height="40" rx="20" fill="#3ddc9722" stroke="#3ddc9766"/>
      <text x="18" y="26" fill="#8ef0c6">learns your sites</text>
    </g>
    <g transform="translate(797,236)">
      <rect width="190" height="40" rx="20" fill="#ffffff11" stroke="#ffffff33"/>
      <text x="18" y="26" fill="#cdd4f0">zero-dep CDP engine</text>
    </g>
  </g>
</svg>
